name: Dev Charter

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/dev-charter-check.yml"
      - "docs/dev-charter/VERSION"
  schedule:
    - cron: "28 7 * * 3"  # Every Wed 07:28 UTC
  workflow_dispatch:

jobs:
  check:
    uses: y-marui/dev-charter/.github/workflows/check-charter.yml@main
    with:
      prefix: docs/dev-charter
      fail_if_outdated: true
    permissions:
      contents: write
      pull-requests: write
