exclude: |
  (?x)^(
    \.git/|
    __pycache__/|
    dist/|
    build/|
    uv\.lock$
  )

repos:
  # ----------------------------------------------------------------
  # Security (required by dev-charter)
  # ----------------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Security (required)
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=500"]
      # General quality
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-docstring-first
      - id: debug-statements
      - id: name-tests-test
        args: ["--pytest-test-first"]
      - id: sort-simple-yaml

  # Block .env files (required by dev-charter)
  - repo: local
    hooks:
      - id: detect-dotenv
        name: Block .env files
        language: fail
        entry: '.env ファイルはコミット禁止。ダミー値のみの .env.example を使うこと。'
        files: '(^|/)\.env(\.[^.]+)?$'
        exclude: '(^|/)\.env\.(example|sample|template)$'

  # Block hardcoded local paths (required by dev-charter)
  - repo: local
    hooks:
      - id: no-hardcoded-local-paths
        name: Block hardcoded local absolute paths
        language: pygrep
        entry: '(/Users/[A-Za-z0-9_.-]+/|/home/[A-Za-z0-9_.-]+/|C:\\Users\\)'
        types_or: [text]
        exclude: |
          (?x)(
            \.md$|
            docs/|
            \.github/|
            \.gitleaks\.toml$|
            \.pre-commit-config\.yaml$
          )

  # ----------------------------------------------------------------
  # Python
  # ----------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-use-type-annotations

  # ----------------------------------------------------------------
  # Shell scripts
  # ----------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]
